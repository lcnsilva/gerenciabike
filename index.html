<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerencia Bike</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" charset="UTF-8" ></script>

</head>
<body>
    <nav>
        <div class="menu-btn">
            <i class="fas fa-bars"></i>
        </div>

        <div class="side-bar">
            <div class="close-btn">
                <i class="fas fa-times"></i>
            </div>
            <div class="menu">
                <div class="item">
                    <a href="index.html"><i class="fas fa-desktop"></i>Admin</a>
                </div>
                <div class="item">
                    <a class="sub-btn"><i class="fas fa-table"></i>Cursos<i class="fas fa-angle-right dropdown"></i></a>
                    <div class="sub-menu">
                        <a href="./admin.html" class="sub-item">Javascript</a>
                        <a href="#" class="sub-item">HTM</a>
                        <a href="#" class="sub-item">CSS</a>

                    </div>
                </div>
                <div class="item">
                    <a href="index.html"><i class="fas fa-th"></i>Recursos</a>
                </div>
                <div class="item">
                    <a href="index.html"><i class="fas fa-cogs"></i>Login</a>
                </div>
                <div class="item">
                    <a href="index.html"><i class="fas fa-info-circle"></i>Sobre</a>
                </div>
            </div>
        </div>
    </nav>
    <script type="text/javascript">
        $(document).ready(function(){
            $('.sub-btn').click(function(){
                $(this).next('.sub-menu').slideToggle();
                $(this).find('.dropdown').toggleClass('rotate');
            });

            $('.menu-btn').click(function(){
                $('.side-bar').addClass('active');
                $('.menu-btn').css("visibility", "hidden");
            });
            $('.close-btn').click(function(){
                $('.side-bar').removeClass('active');
                $('.menu-btn').css("visibility", "visible");
           });
        });
    </script>
</body>
</html>
